<!-- V60.1 隱藏上方三個導覽按鈕：Key In / 幹部目標 / 戰情室 -->
<style>
/* 隱藏標題下方的三個導覽按鈕區，不影響頁面功能 */
.header-tabs,
.top-tabs,
.nav-tabs,
.menu-tabs,
.menu-buttons,
.tab-buttons,
.page-tabs,
.view-tabs,
.mode-tabs,
.toolbar-tabs,
.header-actions,
.hero-actions {
  display: none !important;
}

/* 針對常見按鈕屬性再保險 */
button[data-tab="keyin"],
button[data-tab="target"],
button[data-tab="dashboard"],
button[data-view="keyin"],
button[data-view="target"],
button[data-view="dashboard"],
button[data-page="keyin"],
button[data-page="target"],
button[data-page="dashboard"] {
  display: none !important;
}

/* 只隱藏頂部區塊內的按鈕，避免影響下面表單按鈕 */
header > button,
header .btn,
header .button,
.header > button,
.header .btn,
.header .button,
.hero > button,
.hero .btn,
.hero .button {
  display: none !important;
}

/* 若按鈕外層還佔高度，順便壓縮 */
header .header-tabs,
header .top-tabs,
header .nav-tabs,
header .menu-buttons,
header .tab-buttons,
.header .header-tabs,
.header .top-tabs,
.header .nav-tabs,
.header .menu-buttons,
.header .tab-buttons {
  height: 0 !important;
  min-height: 0 !important;
  margin: 0 !important;
  padding: 0 !important;
  overflow: hidden !important;
}
</style>

<script>
/* V60.1：依文字內容強制隱藏 Key In / 幹部目標 / 戰情室 三個按鈕 */
document.addEventListener("DOMContentLoaded", function () {
  const hideTexts = ["Key In", "幹部目標", "戰情室"];

  document.querySelectorAll("button, a, .btn, .tab, .nav-btn").forEach(function (el) {
    const text = (el.innerText || el.textContent || "").trim();

    if (hideTexts.includes(text)) {
      el.style.display = "none";
    }
  });

  /* 如果三個按鈕的父層已經沒有其他內容，也一起隱藏，避免空白高度 */
  document.querySelectorAll("div, nav, section").forEach(function (box) {
    const visibleChildren = Array.from(box.children).filter(function (child) {
      const style = window.getComputedStyle(child);
      return style.display !== "none" && child.innerText.trim() !== "";
    });

    const boxText = (box.innerText || "").trim();

    if (
      visibleChildren.length === 0 &&
      hideTexts.some(function (t) { return boxText.includes(t); })
    ) {
      box.style.display = "none";
    }
  });
});
</script>
