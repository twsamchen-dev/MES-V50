<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V67.0 MES Target</title>
<style>
:root{--bg:#f4f7fb;--ink:#10213c;--muted:#64748b;--line:#dbe4f0;--brand:#2563eb;--ok:#16a34a;--bad:#dc2626;--warn:#f59e0b}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft JhengHei",Arial,sans-serif;color:var(--ink)}header{padding:22px 28px;background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white}h1{margin:0;font-size:30px}header p{margin:8px 0 0;color:#dbeafe}.wrap{max-width:1500px;margin:auto;padding:18px}.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.nav a{color:#fff;background:#1d4ed8;text-decoration:none;padding:9px 13px;border-radius:10px;font-weight:900}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.card{background:white;border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 10px 28px rgba(15,23,42,.08)}.col12{grid-column:span 12}.col8{grid-column:span 8}.col6{grid-column:span 6}.col4{grid-column:span 4}.col3{grid-column:span 3}@media(max-width:900px){.col8,.col6,.col4,.col3{grid-column:span 12}}label{display:block;margin:10px 0 5px;font-weight:900}input,select,textarea{width:100%;padding:12px;border:1px solid #cbd5e1;border-radius:12px;font-size:16px}.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:900;cursor:pointer;background:var(--brand);color:white;margin:4px}.btn.ok{background:var(--ok)}.btn.ghost{background:#e8f0ff;color:#1e3a8a}.btn.danger{background:var(--bad)}.muted{color:var(--muted);font-size:13px}.kpi{color:white;border-radius:18px;padding:18px}.blue{background:linear-gradient(135deg,#2563eb,#172554)}.green{background:linear-gradient(135deg,#16a34a,#14532d)}.orange{background:linear-gradient(135deg,#f59e0b,#78350f)}.red{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.kpi .label{font-size:13px;opacity:.9}.kpi .num{font-size:38px;font-weight:900;margin-top:8px}.scroll{max-height:430px;overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;font-size:13px}th,td{padding:9px;border-bottom:1px solid var(--line);text-align:left}th{position:sticky;top:0;background:#f8fafc}.toast{position:fixed;right:16px;bottom:16px;background:#020617;color:#fff;padding:12px 16px;border-radius:12px;display:none;z-index:9999}.toast.show{display:block}.found{background:#eff6ff;border:1px solid #bfdbfe;border-radius:14px;padding:12px;margin-top:10px}.warn{background:#fffbeb;border-left:6px solid var(--warn)}
</style>
</head>
<body>
<header><h1>今日幹部目標設定中心｜V67.0 Stable</h1><p>幹部日目標設定 / Target Plan，改讀 keyinsource，只載入 4-3 + PD11B，避免 source 逾時。</p></header>
<div class="wrap">
  <div class="nav"><a href="Dashboard.html">Dashboard</a><a href="index.html">Key In</a><a href="Target.html">Target</a></div>
  <div class="grid">
    <div class="card col12"><button class="btn" id="loadBtn" onclick="loadAll()">重新讀取資料</button><button class="btn ghost" onclick="clearForm()">清空表單</button><span id="loadMsg" class="muted"></span></div>
    <div class="kpi blue col3"><div class="label">工單索引</div><div class="num" id="kpiOrders">0</div></div>
    <div class="kpi green col3"><div class="label">今日目標筆數</div><div class="num" id="kpiTargets">0</div></div>
    <div class="kpi orange col3"><div class="label">今日目標 R</div><div class="num" id="kpiRoll">0</div></div>
    <div class="kpi red col3"><div class="label">未完成目標</div><div class="num" id="kpiOpen">0</div></div>
    <div class="card col8"><h2>新增 / 修改幹部目標</h2><div class="grid">
      <div class="col4"><label>目標日期</label><input id="report_date" type="date"></div><div class="col4"><label>班別</label><select id="shift"><option>早班</option><option>中班</option><option>晚班</option></select></div><div class="col4"><label>幹部角色</label><select id="leader_role"><option>課長</option><option>組長</option><option>班長</option></select></div>
      <div class="col4"><label>幹部姓名</label><input id="leader_name" placeholder="例如 陳善祖"></div><div class="col4"><label>工單號 / 訂單號</label><input id="work_order_no" oninput="lookupWO()" placeholder="例如 MM2605060026"></div><div class="col4"><label>機台</label><input id="machine_code" placeholder="例如 1S03 / 1B02"></div>
      <div class="col4"><label>訂單單號</label><input id="order_no" placeholder="可空白"></div><div class="col4"><label>料號</label><input id="part_no" placeholder="可由工單帶入"></div><div class="col4"><label>生產批號</label><input id="batch_no" placeholder="可空白"></div>
      <div class="col4"><label>製程站點</label><select id="process_site"><option>分條</option><option>複捲</option><option>包裝</option><option>上膠</option><option>其他</option></select></div><div class="col4"><label>目標卷數 R</label><input id="target_roll" type="number" step="0.01"></div><div class="col4"><label>目標 ㎡</label><input id="target_m2" type="number" step="0.01"></div>
      <div class="col6"><label>客戶</label><input id="customer"></div><div class="col6"><label>產品規格</label><input id="product_spec"></div><div class="col6"><label>預計完成</label><input id="planned_finish" type="date"></div><div class="col6"><label>狀態</label><select id="status"><option>未完成</option><option>進行中</option><option>已完成</option></select></div><div class="col12"><label>備註</label><textarea id="note" rows="3"></textarea></div>
    </div><div id="lookupBox" class="found">請輸入工單號，可自動帶入工單資料。</div><button class="btn ok" onclick="saveTarget()">儲存目標</button><span id="saveMsg" class="muted"></span></div>
    <div class="card col4"><h2>可快速帶入工單</h2><input id="search" placeholder="搜尋工單 / 料號 / 規格 / 客戶 / 製程" oninput="renderQuickList()"><div id="quickList" class="found" style="max-height:500px;overflow:auto">讀取後顯示</div></div>
    <div class="card col12"><h2>今日目標清單</h2><div id="targetTable"></div></div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const API_URL=window.MES_API_URL||"https://script.google.com/macros/s/AKfycbyW4ayFKOWHRUWAvMNgKfXcnEsTDsXoq3Dxd9ki97dEdeXuhPuJ7sVvhEsm-o6wf1V3/exec";let IDX={},ORDERS=[],TARGETS=[];
function $(id){return document.getElementById(id)}function toast(s){let t=$('toast');t.textContent=s;t.className='toast show';setTimeout(()=>t.className='toast',2500)}function today(){return new Date().toISOString().slice(0,10)}function wo12(v){return String(v??'').trim().replace(/\s+/g,'').toUpperCase().slice(0,12)}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function num(v){let n=parseFloat(String(v??'').replace(/,/g,''));return isNaN(n)?0:n}function dateKey(v){let s=String(v||'').replace(/\//g,'-');let m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);return m?m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0'):s.slice(0,10)}
function apiGet(action,params={}){return new Promise((resolve,reject)=>{const cb='MES_TARGET_CB_'+Date.now()+'_'+Math.floor(Math.random()*999999);const qs=new URLSearchParams(Object.assign({action,callback:cb,_:Date.now()},params)).toString();const s=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('API 讀取逾時：'+action))},30000);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=undefined}if(s.parentNode)s.parentNode.removeChild(s)}window[cb]=res=>{cleanup();if(res&&res.ok===false)reject(new Error(res.message||res.error||'API error'));else resolve(res||{})};s.onerror=()=>{cleanup();reject(new Error('API 連線失敗：'+action))};s.src=API_URL+'?'+qs;document.head.appendChild(s)})}
async function apiPost(action,body){await fetch(API_URL+'?action='+encodeURIComponent(action)+'&_='+Date.now(),{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body||{})});return {ok:true}}
function normalizeRows(rows){return(rows||[]).map(r=>Object.assign({},r,{work_order_no:wo12(r.work_order_no||r.order_no||r['工單號']||r['命令單號']||r['訂單單號']||''),order_no:r.order_no||r['訂單單號']||'',batch_no:r.batch_no||r['生產批號']||r['批號']||'',part_no:r.part_no||r['料號']||r['品號']||'',product_spec:r.product_spec||r['產品規格']||r['規格']||'',customer:r.customer||r['客戶']||r['客戶別']||'',process:r.process||r['製程']||r['製程站點']||'',machine:r.machine||r['機台']||'',target_qty:r.target_qty||r['目標數量']||r['預計產量']||'',source:r.source||''})).filter(r=>r.work_order_no)}
$('report_date').value=today();$('planned_finish').value=today();
async function loadAll(){try{$('loadBtn').textContent='讀取中...';$('loadMsg').textContent='讀取工單索引 4-3 + PD11B...';const [s,t]=await Promise.all([apiGet('keyinsource'),apiGet('targets',{date:$('report_date').value||today()})]);ORDERS=normalizeRows(s.rows||[]);IDX={};ORDERS.forEach(r=>{if(r.work_order_no&&!IDX[r.work_order_no])IDX[r.work_order_no]=r});TARGETS=(t.rows||[]);$('loadMsg').textContent='已讀取工單 '+ORDERS.length+' 筆，今日目標 '+TARGETS.length+' 筆';toast('資料讀取完成');renderQuickList();renderTargets();updateKpi()}catch(e){alert('讀取失敗：'+e.message)}finally{$('loadBtn').textContent='重新讀取資料'}}
function updateKpi(){$('kpiOrders').textContent=ORDERS.length.toLocaleString();$('kpiTargets').textContent=TARGETS.length.toLocaleString();$('kpiRoll').textContent=TARGETS.reduce((a,r)=>a+num(r.target_roll),0).toLocaleString();$('kpiOpen').textContent=TARGETS.filter(r=>String(r.status||'')!=='已完成').length.toLocaleString()}
function lookupWO(){const w=wo12($('work_order_no').value);$('work_order_no').value=w;const r=IDX[w];if(!w){$('lookupBox').innerHTML='請輸入工單號，可自動帶入工單資料。';return}if(!r){$('lookupBox').innerHTML='查無工單：'+esc(w);return}fillFromOrder(r);$('lookupBox').innerHTML='<b>已帶入</b><br>來源：'+esc(r.source)+'<br>料號：'+esc(r.part_no)+'<br>規格：'+esc(r.product_spec)+'<br>客戶：'+esc(r.customer)}
function fillFromOrder(r){$('work_order_no').value=r.work_order_no||'';$('order_no').value=r.order_no||'';$('part_no').value=r.part_no||'';$('batch_no').value=r.batch_no||'';$('customer').value=r.customer||'';$('product_spec').value=r.product_spec||'';if(r.process)$('process_site').value=r.process;if(r.machine)$('machine_code').value=r.machine;if(r.target_qty&&!$('target_roll').value)$('target_roll').value=r.target_qty}
function renderQuickList(){const q=String($('search').value||'').toLowerCase();let rows=ORDERS.filter(r=>!q||[r.work_order_no,r.order_no,r.part_no,r.batch_no,r.product_spec,r.customer,r.process,r.machine].join(' ').toLowerCase().includes(q)).slice(0,80);$('quickList').innerHTML=rows.length?rows.map(r=>'<div style="padding:8px;border-bottom:1px solid #dbe4f0;cursor:pointer" onclick="fillFromOrder(IDX[\''+r.work_order_no+'\'])"><b>'+esc(r.work_order_no)+'</b><br><span class="muted">'+esc(r.customer||'-')+'｜'+esc(r.part_no||'-')+'｜'+esc(r.product_spec||'-')+'</span></div>').join(''):'目前無資料'}
function renderTargets(){if(!TARGETS.length){$('targetTable').innerHTML='<div class="muted">目前無目標</div>';return}const heads=['report_date','shift','leader_name','work_order_no','process_site','machine_code','target_roll','target_m2','status','note'];$('targetTable').innerHTML='<div class="scroll"><table><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+TARGETS.map(r=>'<tr>'+heads.map(h=>'<td>'+esc(r[h]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>'}
function clearForm(){['leader_name','work_order_no','order_no','part_no','batch_no','machine_code','customer','product_spec','target_roll','target_m2','note'].forEach(id=>$(id).value='');$('lookupBox').innerHTML='請輸入工單號，可自動帶入工單資料。'}
async function saveTarget(){const data={report_date:$('report_date').value||today(),shift:$('shift').value,leader_role:$('leader_role').value,leader_name:$('leader_name').value,work_order_no:wo12($('work_order_no').value),order_no:$('order_no').value,process_site:$('process_site').value,machine_code:$('machine_code').value,customer:$('customer').value,product_spec:$('product_spec').value,target_roll:$('target_roll').value,target_m2:$('target_m2').value,planned_finish:$('planned_finish').value,status:$('status').value,note:$('note').value};if(!data.work_order_no){toast('請輸入工單號');return}try{await apiPost('savetargetplan',data);$('saveMsg').textContent='已儲存';toast('目標已儲存');setTimeout(loadAll,700)}catch(e){alert('儲存失敗：'+e.message)}}
loadAll();
</script>
</body></html>
