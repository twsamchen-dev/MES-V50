<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V60.0 MES 戰情室</title><link rel="stylesheet" href="style.css"><script src="api.js"></script></head><body>
<header><h1>生產戰情室｜V60.0 MES Enterprise</h1><p>資料檢視頁：Key In、幹部目標、工單資料摘要</p><div class="nav"><a href="index.html">Key In</a><a href="target.html">幹部目標</a><a href="dashboard.html">戰情室</a></div></header>
<div class="wrap"><div class="grid">
<div class="card hero col12"><h2>戰情室資料摘要</h2><div class="sub">此版先保留輕量戰情室，避免 GitHub 專案檔案混亂。後續可再把正式 Dashboard 內容合併進來。</div><div class="row" style="margin-top:12px"><button class="btn" onclick="loadAll()">重新讀取</button><span id="status" class="pill">尚未讀取</span></div></div>
<div class="card kpi blue col3"><div class="name">工單資料</div><div class="num" id="k1">0</div></div><div class="card kpi green col3"><div class="name">Key In 回報</div><div class="num" id="k2">0</div></div><div class="card kpi orange col3"><div class="name">幹部目標</div><div class="num" id="k3">0</div></div><div class="card kpi red col3"><div class="name">Employee</div><div class="num" id="k4">0</div></div>
<div class="card col12"><h2>最近 Key In</h2><div class="scroll"><table><thead><tr><th>時間</th><th>日期</th><th>站點</th><th>工單</th><th>機台</th><th>人員</th><th>產量</th><th>備註</th></tr></thead><tbody id="rows"></tbody></table></div></div>
</div></div><div id="toast" class="toast"></div><script>
async function loadAll(){document.getElementById('status').textContent='讀取中...';try{const [s,k,t,e]=await Promise.all([MES.get('getSourceData'),MES.get('listKeyin'),MES.get('listTargetPlans',[],{date:today().replaceAll('/','-')}),MES.get('listEmployees')]);document.getElementById('k1').textContent=(s.rows||[]).length;document.getElementById('k2').textContent=(k.rows||[]).length;document.getElementById('k3').textContent=(t.rows||[]).length;document.getElementById('k4').textContent=(e.rows||[]).length;document.getElementById('rows').innerHTML=(k.rows||[]).slice(-80).reverse().map(r=>'<tr><td>'+esc(r.created_at)+'</td><td>'+esc(r.report_date)+'</td><td>'+esc(r.site)+'</td><td><b>'+esc(r.work_order_no)+'</b></td><td>'+esc(r.machine_code)+'</td><td>'+esc(r.emp_no+' '+r.emp_name)+'</td><td>'+esc(r.actual_output+' '+r.unit)+'</td><td>'+esc(r.process_note)+'</td></tr>').join('')||'<tr><td colspan="8" class="hint">尚無資料</td></tr>';document.getElementById('status').textContent='已讀取 '+new Date().toLocaleString()}catch(e){alert('讀取失敗：'+e.message)}}document.addEventListener('DOMContentLoaded',loadAll)</script></body></html>
