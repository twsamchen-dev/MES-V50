<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>V80.3 MES DataHub Master</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#10213c;--muted:#64748b;--line:#dbe4f0;--brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626;--soft:#eef6ff}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:"Microsoft JhengHei",Arial,sans-serif;color:var(--ink)}header{background:linear-gradient(135deg,#1d4ed8,#0f172a);color:white;padding:18px 24px}h1{margin:0;font-size:28px}header p{margin:8px 0 0;color:#dbeafe}.wrap{max-width:1800px;margin:auto;padding:14px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:12px}.card{background:white;border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 8px 22px rgba(15,23,42,.06)}.col12{grid-column:span 12}.col8{grid-column:span 8}.col4{grid-column:span 4}.kpis{grid-column:span 12;display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.kpi{color:white;border-radius:16px;padding:14px;min-height:92px}.kpi b{font-size:32px;display:block;margin-top:8px}.blue{background:linear-gradient(135deg,#2563eb,#172554)}.green{background:linear-gradient(135deg,#16a34a,#14532d)}.orange{background:linear-gradient(135deg,#f59e0b,#78350f)}.red{background:linear-gradient(135deg,#dc2626,#7f1d1d)}.slate{background:linear-gradient(135deg,#475569,#0f172a)}button{border:0;border-radius:12px;padding:11px 16px;font-weight:900;cursor:pointer;background:var(--brand);color:white}button.ghost{background:#e8f0ff;color:#1e3a8a}input,select{padding:10px 12px;border:1px solid #cbd5e1;border-radius:12px;font-size:15px;background:white}.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.toolbar input{min-width:320px}.muted{color:var(--muted);font-size:13px}.scroll{overflow:auto;max-height:640px;border:1px solid var(--line);border-radius:14px}table{border-collapse:collapse;width:100%;font-size:13px;background:white}th,td{padding:8px 9px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left}th{position:sticky;top:0;background:#f8fafc;z-index:1}.tag{display:inline-block;padding:4px 8px;border-radius:999px;background:#eef2ff;color:#1e3a8a;font-weight:900;font-size:12px}.ok{color:#15803d;font-weight:900}.warn{color:#b45309;font-weight:900}.bad{color:#b91c1c;font-weight:900}.detail{background:#f8fafc;border-radius:14px;border:1px solid var(--line);padding:12px;min-height:300px}.rowcard{border-bottom:1px solid var(--line);padding:10px;cursor:pointer}.rowcard:hover{background:#f8fafc}@media(max-width:1100px){.col8,.col4{grid-column:span 12}.kpis{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<header><h1>MES DataHub Master｜V80.3 Enterprise</h1><p>新增第 4 個獨立主網頁；只讀取 MasterData，不覆蓋 Key In / Target / Dashboard。</p></header>
<div class="wrap"><div class="grid">
  <div class="card col12 toolbar">
    <button onclick="loadData()">讀取 MasterData</button>
    <button class="ghost" onclick="setToday()">今日</button>
    <button class="ghost" onclick="setWeek()">一周</button>
    <button class="ghost" onclick="setMonth()">本月</button>
    <input id="q" placeholder="搜尋：訂單 / 日報 / 命令 / 批號 / 客戶 / 料號 / 機台" oninput="debounceLoad()">
    <input id="start" type="date" onchange="loadData()"><input id="end" type="date" onchange="loadData()">
    <span id="msg" class="muted">尚未讀取</span>
  </div>
  <div class="kpis">
    <div class="kpi blue">總筆數<b id="kTotal">0</b></div>
    <div class="kpi green">完整配對<b id="kComplete">0</b></div>
    <div class="kpi orange">資料不足<b id="kPartial">0</b></div>
    <div class="kpi red">逾期疑慮<b id="kOverdue">0</b></div>
    <div class="kpi slate">配對率<b id="kRate">0%</b></div>
    <div class="kpi blue">Key In量<b id="kKeyin">0</b></div>
  </div>
  <div class="card col8"><h2>MasterData 清單 / รายการข้อมูลรวม</h2><div class="scroll"><table id="tbl"><thead><tr>
    <th>狀態</th><th>預交日</th><th>客戶</th><th>訂單單號</th><th>日報號</th><th>命令單號</th><th>批號</th><th>料號</th><th>規格</th><th>寬</th><th>長</th><th>製程</th><th>機台</th><th>Target R</th><th>KeyIn R</th><th>完成率</th>
  </tr></thead><tbody><tr><td colspan="16" class="muted">請按「讀取 MasterData」</td></tr></tbody></table></div></div>
  <div class="card col4"><h2>工單詳細 / รายละเอียด</h2><div id="detail" class="detail muted">點選左側資料列查看完整關聯。</div></div>
</div></div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbyW4ayFKOWHRUWAvMNgKfXcnEsTDsXoq3Dxd9ki97dEdeXuhPuJ7sVvhEsm-o6wf1V3/exec";
let ROWS=[],timer=null;
function $(id){return document.getElementById(id)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function today(){return new Date().toISOString().slice(0,10)}
function addDays(d,n){let x=new Date(d+'T00:00:00');x.setDate(x.getDate()+n);return x.toISOString().slice(0,10)}
function firstMonth(d){return d.slice(0,8)+'01'}
function lastMonth(d){let x=new Date(d.slice(0,7)+'-01T00:00:00');x.setMonth(x.getMonth()+1);x.setDate(0);return x.toISOString().slice(0,10)}
function setToday(){let d=today();$('start').value=d;$('end').value=d;loadData()}
function setWeek(){let d=today();$('start').value=d;$('end').value=addDays(d,6);loadData()}
function setMonth(){let d=today();$('start').value=firstMonth(d);$('end').value=lastMonth(d);loadData()}
function debounceLoad(){clearTimeout(timer);timer=setTimeout(loadData,450)}
function api(action,params={}){return new Promise((resolve,reject)=>{const cb='M80_'+Date.now()+'_'+Math.floor(Math.random()*99999);params=Object.assign({action,callback:cb,_:Date.now()},params);const qs=new URLSearchParams(params).toString();const s=document.createElement('script');const t=setTimeout(()=>{cleanup();reject(new Error('API逾時'))},60000);function cleanup(){clearTimeout(t);try{delete window[cb]}catch(e){} if(s.parentNode)s.parentNode.removeChild(s)}window[cb]=res=>{cleanup();if(res&&res.ok===false)reject(new Error(res.message||res.error||'API error'));else resolve(res||{})};s.onerror=()=>{cleanup();reject(new Error('API連線失敗'))};s.src=API_URL+'?'+qs;document.head.appendChild(s)})}
async function loadData(){try{$('msg').textContent='讀取中...';const res=await api('masterdata',{q:$('q').value,start:$('start').value,end:$('end').value,limit:1500});ROWS=res.rows||[];render(ROWS,res.summary||{});$('msg').textContent='已讀取 '+ROWS.length+' / 總 '+(res.total||ROWS.length)+' 筆｜'+(res.time||'')}catch(e){$('msg').textContent='讀取失敗：'+e.message;alert('讀取失敗：'+e.message)}}
function render(rows,summary){$('kTotal').textContent=summary.total??rows.length;$('kComplete').textContent=summary.complete??0;$('kPartial').textContent=summary.partial??0;$('kOverdue').textContent=summary.overdue??0;$('kRate').textContent=(summary.pair_rate??0)+'%';$('kKeyin').textContent=rows.reduce((a,r)=>a+Number(r.keyin_roll||0),0).toLocaleString();
 const tbody=$('tbl').querySelector('tbody');tbody.innerHTML=rows.length?rows.map((r,i)=>`<tr onclick="showDetail(${i})"><td class="${String(r.match_status).includes('完整')?'ok':'warn'}">${esc(r.match_status)}</td><td>${esc(r.due_date)}</td><td>${esc(r.customer)}</td><td><b>${esc(r.order_no)}</b></td><td>${esc(r.daily_no)}</td><td>${esc(r.command_no)}</td><td>${esc(r.batch_no)}</td><td>${esc(r.part_no)}</td><td>${esc(r.product_spec)}</td><td>${esc(r.width_mm)}</td><td>${esc(r.length_m)}</td><td>${esc(r.process)}</td><td>${esc(r.machine)}</td><td>${esc(r.target_roll)}</td><td>${esc(r.keyin_roll)}</td><td>${esc(r.completion_pct)}%</td></tr>`).join(''):`<tr><td colspan="16" class="muted">沒有資料</td></tr>`}
function showDetail(i){const r=ROWS[i];$('detail').innerHTML=`<h3>${esc(r.order_no||r.command_no||'-')}</h3><p><span class="tag">${esc(r.match_status)}</span></p><p><b>客戶：</b>${esc(r.customer)}<br><b>預交日：</b>${esc(r.due_date)}<br><b>日報號：</b>${esc(r.daily_no)}<br><b>命令單號：</b>${esc(r.command_no)}<br><b>生產批號：</b>${esc(r.batch_no)}</p><p><b>投入料號：</b>${esc(r.input_part_no)}<br><b>投入製號：</b>${esc(r.input_lot_no)}<br><b>產出料號：</b>${esc(r.output_part_no)}<br><b>產出製號：</b>${esc(r.output_lot_no)}</p><p><b>規格：</b>${esc(r.product_spec)}<br><b>寬×長：</b>${esc(r.width_mm)} × ${esc(r.length_m)}</p><p><b>製程：</b>${esc(r.process)}<br><b>機台：</b>${esc(r.machine)}</p><p><b>Target：</b>${esc(r.target_roll)} R<br><b>Key In：</b>${esc(r.keyin_roll)} R<br><b>完成率：</b>${esc(r.completion_pct)}%</p>`}
document.addEventListener('DOMContentLoaded',()=>{setWeek()});
</script>
</body></html>
