<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>V57 MES Key In</title><style>
:root{--bg:#071529;--panel:#0b2140;--card:#112b52;--line:#29466f;--txt:#eef6ff;--muted:#a9c1df;--brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#061529,#0b2140 55%,#061529);font-family:"Microsoft JhengHei",Arial,sans-serif;color:var(--txt)}header{padding:22px 28px;background:linear-gradient(135deg,#0f3b8f,#071529);border-bottom:1px solid #1e3a5f}h1{margin:0;font-size:34px}header p{color:#c7d7f0;margin:8px 0 0}.wrap{max-width:1500px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 12px 32px rgba(0,0,0,.18)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col12{grid-column:span 12}.col6{grid-column:span 6}.col4{grid-column:span 4}.col3{grid-column:span 3}.col2{grid-column:span 2}@media(max-width:900px){.col6,.col4,.col3,.col2{grid-column:span 12}}.kpi{background:linear-gradient(135deg,#174ea6,#0b2140);border:1px solid #2b5a9b;border-radius:18px;padding:18px}.kpi .label{color:#c7d7f0;font-weight:800}.kpi .num{font-size:42px;font-weight:900;margin-top:8px}.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:900;color:white;background:var(--brand);cursor:pointer;margin:4px}.btn.ok{background:var(--ok)}.btn.ghost{background:#e8f0ff;color:#1e3a8a}.btn.warn{background:var(--warn)}input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #bed0e8;font-size:16px}label{display:block;margin:10px 0 5px;font-weight:900;color:#dceaff}.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.muted{color:var(--muted);font-size:13px}.oktext{color:#86efac}.badtext{color:#fecaca}table{width:100%;border-collapse:collapse;background:rgba(255,255,255,.04)}th,td{padding:9px;border-bottom:1px solid #27466e;text-align:left;font-size:13px}th{background:rgba(255,255,255,.08);position:sticky;top:0}.scroll{max-height:450px;overflow:auto;border-radius:12px;border:1px solid #27466e}.toast{position:fixed;right:16px;bottom:16px;background:#020617;color:#fff;padding:12px 16px;border-radius:12px;display:none;z-index:9999}.toast.show{display:block}.pill{display:inline-block;background:#dbeafe;color:#1e40af;border-radius:999px;padding:4px 9px;font-weight:900;font-size:12px;margin:2px}.warnbox{background:#fff7ed;color:#7c2d12;border-left:6px solid var(--warn)}.light{background:#f8fbff;color:#10213c}.light h2{color:#10213c}.light .muted{color:#64748b}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;background:#1d4ed8;text-decoration:none;padding:9px 13px;border-radius:10px;font-weight:900}
</style></head><body><header><h1>生產 Key In｜V57.1 Enterprise Stable</h1><p>人員回報產量 / บันทึกผลงานผลิต</p></header><div class="wrap"><div class="nav"><a href="Dashboard.html">Dashboard</a><a href="index.html">Key In</a><a href="Target.html">Target</a></div><div class="grid"><div class="card col6"><h2>工單資料</h2><button class="btn ghost" onclick="loadBase()">讀取最新工單/員工/目標</button><label>日期</label><input id="report_date" type="date"><label>製程站點</label><select id="site"><option>分條</option><option>複捲</option><option>包裝</option><option>上膠</option><option>其他</option></select><label>工單號</label><input id="work_order_no" maxlength="12" oninput="lookup()"><label>批號</label><input id="batch_no" readonly><div id="lookup" class="card light">請輸入工單號</div></div><div class="card col6"><h2>人員與產出</h2><label>工號</label><input id="emp_no" oninput="fillEmp()"><label>姓名</label><input id="emp_name"><label>機台</label><input id="machine_code"><label>實際產量</label><input id="actual_output" type="number" step="0.01"><label>單位</label><select id="unit"><option>R</option><option>M2</option><option>M</option><option>PCS</option></select><label>備註</label><textarea id="process_note"></textarea><button class="btn ok" onclick="submit()">送出回報</button><div id="msg" class="muted"></div></div></div></div><div id="toast" class="toast"></div><script>
const API_URL = window.MES_API_URL || "https://script.google.com/macros/s/AKfycbyW4ayFKOWHRUWAvMNgKfXcnEsTDsXoq3Dxd9ki97dEdeXuhPuJ7sVvhEsm-o6wf1V3/exec";
function toast(s){let t=document.getElementById('toast');if(t){t.textContent=s;t.className='toast show';setTimeout(()=>t.className='toast',2600)}}
function today(){return new Date().toISOString().slice(0,10)}
function dateKey(v){let s=String(v||'').trim().replace(/\//g,'-');let m=s.match(/(\d{4})-(\d{1,2})-(\d{1,2})/);return m?m[1]+'-'+m[2].padStart(2,'0')+'-'+m[3].padStart(2,'0'):s.slice(0,10)}
function num(v){let n=parseFloat(String(v??'').replace(/,/g,''));return isNaN(n)?0:n}
function wo12(v){return String(v??'').trim().replace(/\s+/g,'').toUpperCase().slice(0,12)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
async function apiGet(action, params={}){
  const qs = new URLSearchParams(Object.assign({action, _: Date.now()}, params)).toString();
  const url = API_URL + '?' + qs;
  const res = await fetch(url, {method:'GET', redirect:'follow', cache:'no-store'});
  if(!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  let json;
  try { json = JSON.parse(text); }
  catch(e) { throw new Error('API 回傳非 JSON：' + text.slice(0,120)); }
  if(json && json.ok === false) throw new Error(json.error || json.message || 'API error');
  return json || {};
}

function apiPost(action, body){
  if(location.hostname.includes('github.io')){window.open(API_URL+'?mode=admin','_blank'); return Promise.reject(new Error('GitHub 版不寫入，已開啟 Apps Script 管理端'));}
  return fetch(API_URL+'?action='+encodeURIComponent(action),{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body||{})}).then(r=>r.text()).then(t=>JSON.parse(t));
}
function table(rows, heads){rows=rows||[]; if(!rows.length)return '<div class="muted">目前無資料</div>'; return '<div class="scroll"><table><thead><tr>'+heads.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+rows.slice(0,600).map(r=>'<tr>'+heads.map(h=>'<td>'+esc(r[h]||'')+'</td>').join('')+'</tr>').join('')+'</tbody></table></div>';}

let IDX={}, EMP={};
document.getElementById('report_date').value=today();
async function loadBase(){try{let [s,e]=await Promise.all([apiGet('source'),apiGet('employees')]); IDX={};(s.rows||[]).forEach(r=>{let w=wo12(r.work_order_no||r.order_no); if(w) IDX[w]=r;}); EMP={};(e.rows||[]).forEach(r=>EMP[String(r.emp_no||'').trim()]=r.emp_name||''); toast('已讀取 '+Object.keys(IDX).length+' 張工單');}catch(err){alert('讀取失敗：'+err.message)}}
function lookup(){let w=wo12(document.getElementById('work_order_no').value); document.getElementById('work_order_no').value=w; let r=IDX[w]; if(!r){document.getElementById('lookup').innerHTML='查無工單';return} document.getElementById('batch_no').value=r.batch_no||''; document.getElementById('lookup').innerHTML=`<b>已找到</b><br>料號：${esc(r.part_no)}<br>規格：${esc(r.product_spec)}<br>客戶：${esc(r.customer)}`;}
function fillEmp(){let ids=document.getElementById('emp_no').value.split(/[ ,，、]+/).filter(Boolean); let names=ids.map(x=>EMP[x]).filter(Boolean); if(names.length)document.getElementById('emp_name').value=names.join('、');}
async function submit(){let data={}; ['site','report_date','work_order_no','batch_no','machine_code','actual_output','unit','emp_no','emp_name','process_note'].forEach(id=>data[id]=document.getElementById(id).value); if(!data.work_order_no||!data.actual_output){toast('請輸入工單與產量');return} try{let res=await apiPost('savekeyin',data); document.getElementById('msg').textContent='已送出'; toast('回報成功'); document.getElementById('actual_output').value='';document.getElementById('process_note').value='';}catch(e){alert(e.message)}}
loadBase();</script></body></html>
