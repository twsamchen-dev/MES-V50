<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>V66.1 MES Key In</title>
<style>
:root{--bg:#071529;--panel:#0b2140;--card:#112b52;--line:#29466f;--txt:#eef6ff;--muted:#a9c1df;--brand:#2563eb;--ok:#16a34a;--warn:#f59e0b;--bad:#dc2626}*{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#061529,#0b2140 55%,#061529);font-family:"Microsoft JhengHei",Arial,sans-serif;color:var(--txt)}header{padding:22px 28px;background:linear-gradient(135deg,#0f3b8f,#071529);border-bottom:1px solid #1e3a5f}h1{margin:0;font-size:34px}header p{color:#c7d7f0;margin:8px 0 0}.wrap{max-width:1500px;margin:auto;padding:18px}.card{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;padding:18px;margin:14px 0;box-shadow:0 12px 32px rgba(0,0,0,.18)}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px}.col6{grid-column:span 6}@media(max-width:900px){.col6{grid-column:span 12}}.btn{border:0;border-radius:12px;padding:11px 16px;font-weight:900;color:white;background:var(--brand);cursor:pointer;margin:4px}.btn.ok{background:var(--ok)}.btn.ghost{background:#e8f0ff;color:#1e3a8a}input,select,textarea{width:100%;padding:12px;border-radius:12px;border:1px solid #bed0e8;font-size:16px}label{display:block;margin:10px 0 5px;font-weight:900;color:#dceaff}.muted{color:var(--muted);font-size:13px}.toast{position:fixed;right:16px;bottom:16px;background:#020617;color:#fff;padding:12px 16px;border-radius:12px;display:none;z-index:9999}.toast.show{display:block}.light{background:#f8fbff;color:#10213c}.nav{display:flex;gap:10px;flex-wrap:wrap}.nav a{color:#fff;background:#1d4ed8;text-decoration:none;padding:9px 13px;border-radius:10px;font-weight:900}.statusOk{color:#86efac}.statusBad{color:#fecaca}
</style>
</head>
<body>
<header><h1>生產 Key In｜V66.1 Stable</h1><p>人員回報產量 / บันทึกผลงานผลิต</p></header>
<div class="wrap">
  <div class="nav"><a href="Dashboard.html">Dashboard</a><a href="index.html">Key In</a><a href="Target.html">Target</a></div>
  <div class="grid">
    <div class="card col6">
      <h2>工單資料</h2>
      <button class="btn ghost" id="loadBtn" onclick="loadBase()">讀取最新工單/員工</button>
      <label>日期</label><input id="report_date" type="date">
      <label>製程站點</label><select id="site"><option>分條</option><option>複捲</option><option>包裝</option><option>上膠</option><option>其他</option></select>
      <label>工單號</label><input id="work_order_no" maxlength="12" oninput="lookup()" placeholder="例如 MM2605060026">
      <label>批號</label><input id="batch_no" readonly>
      <div id="lookup" class="card light">請輸入工單號</div>
    </div>
    <div class="card col6">
      <h2>人員與產出</h2>
      <label>工號</label><input id="emp_no" oninput="fillEmp()" placeholder="例如 41420,41433">
      <label>姓名</label><input id="emp_name" placeholder="依工號自動帶入，可手動補充">
      <label>機台</label><input id="machine_code" placeholder="例如 1S03 / 1B02">
      <label>實際產量</label><input id="actual_output" type="number" step="0.01">
      <label>單位</label><select id="unit"><option>R</option><option>M2</option><option>M</option><option>PCS</option></select>
      <label>備註</label><textarea id="process_note" rows="3"></textarea>
      <button class="btn ok" onclick="submitKeyin()">送出回報</button>
      <div id="msg" class="muted"></div>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script>
const API_URL = window.MES_API_URL || "https://script.google.com/macros/s/AKfycbyW4ayFKOWHRUWAvMNgKfXcnEsTDsXoq3Dxd9ki97dEdeXuhPuJ7sVvhEsm-o6wf1V3/exec";
let IDX = {}, EMP = {};
function toast(s){const t=document.getElementById('toast');if(!t)return;t.textContent=s;t.className='toast show';setTimeout(()=>t.className='toast',2600)}
function today(){return new Date().toISOString().slice(0,10)}
function wo12(v){return String(v??'').trim().replace(/\s+/g,'').toUpperCase().slice(0,12)}
function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function apiGet(action, params={}){return new Promise((resolve,reject)=>{const cb='MES_KEYIN_CB_'+Date.now()+'_'+Math.floor(Math.random()*999999);const qs=new URLSearchParams(Object.assign({action,callback:cb,_:Date.now()},params)).toString();const s=document.createElement('script');const timer=setTimeout(()=>{cleanup();reject(new Error('API 讀取逾時：'+action));},30000);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=undefined}if(s.parentNode)s.parentNode.removeChild(s)}window[cb]=res=>{cleanup();if(res&&res.ok===false)reject(new Error(res.message||res.error||'API error'));else resolve(res||{})};s.onerror=()=>{cleanup();reject(new Error('API 連線失敗：'+action))};s.src=API_URL+'?'+qs;document.head.appendChild(s)})}
async function apiPost(action, body){await fetch(API_URL+'?action='+encodeURIComponent(action)+'&_='+Date.now(),{method:'POST',mode:'no-cors',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body||{})});return {ok:true}}
function normalizeRows(rows){return (rows||[]).map(r=>Object.assign({},r,{work_order_no:wo12(r.work_order_no||r.order_no||r['工單號']||r['命令單號']||r['訂單單號']||''),order_no:r.order_no||r['訂單單號']||r['訂單號']||'',batch_no:r.batch_no||r['生產批號']||r['批號']||r['製號']||'',part_no:r.part_no||r['料號']||r['品號']||r['料品編號']||'',product_spec:r.product_spec||r['產品規格']||r['規格']||r['品名規格']||'',customer:r.customer||r['客戶']||r['客戶別']||r['客戶名稱']||'',target_qty:r.target_qty||r['目標數量']||r['預計產量']||'',source:r.source||r['source']||''})).filter(r=>r.work_order_no)}
document.getElementById('report_date').value=today();
async function loadBase(){const b=document.getElementById('loadBtn');try{b.textContent='讀取中...';toast('讀取中...');const [s,e]=await Promise.all([apiGet('source'),apiGet('employees')]);const rows=normalizeRows(s.rows||[]);IDX={};rows.forEach(r=>{const w=wo12(r.work_order_no||r.order_no);if(w&&!IDX[w])IDX[w]=r});EMP={};(e.rows||[]).forEach(r=>{const no=String(r.emp_no||r['工號']||'').trim();const name=r.emp_name||r['姓名']||'';if(no)EMP[no]=name});toast('已讀取工單：'+Object.keys(IDX).length+' 張');lookup()}catch(err){alert('讀取失敗：'+err.message)}finally{b.textContent='讀取最新工單/員工'}}
function lookup(){const input=document.getElementById('work_order_no');const w=wo12(input.value);input.value=w;const r=IDX[w];const box=document.getElementById('lookup');if(!w){box.innerHTML='請輸入工單號';return}if(!r){box.innerHTML='查無工單：'+esc(w);document.getElementById('batch_no').value='';return}document.getElementById('batch_no').value=r.batch_no||'';box.innerHTML='<b>已找到</b><br>來源：'+esc(r.source||'-')+'<br>料號：'+esc(r.part_no||'-')+'<br>規格：'+esc(r.product_spec||'-')+'<br>客戶：'+esc(r.customer||'-')+'<br>目標：'+esc(r.target_qty||'-')}
function fillEmp(){const ids=document.getElementById('emp_no').value.split(/[ ,，、]+/).map(x=>x.trim()).filter(Boolean);const names=ids.map(x=>EMP[x]).filter(Boolean);if(names.length)document.getElementById('emp_name').value=names.join('、')}
async function submitKeyin(){const base=IDX[wo12(document.getElementById('work_order_no').value)]||{};const data={site:document.getElementById('site').value,report_date:document.getElementById('report_date').value,work_order_no:wo12(document.getElementById('work_order_no').value),order_no:base.order_no||'',part_no:base.part_no||'',batch_no:document.getElementById('batch_no').value||base.batch_no||'',product_spec:base.product_spec||'',target_qty:base.target_qty||'',machine_code:document.getElementById('machine_code').value,actual_output:document.getElementById('actual_output').value,unit:document.getElementById('unit').value,emp_no:document.getElementById('emp_no').value,emp_name:document.getElementById('emp_name').value,process_note:document.getElementById('process_note').value,input_source:'github_keyin'};if(!data.work_order_no||!data.actual_output){toast('請輸入工單與產量');return}try{await apiPost('savekeyin',data);document.getElementById('msg').innerHTML='<span class="statusOk">已送出</span>';toast('回報成功');document.getElementById('actual_output').value='';document.getElementById('process_note').value=''}catch(e){alert('送出失敗：'+e.message)}}
loadBase();
</script>
</body>
</html>
